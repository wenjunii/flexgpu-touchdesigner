name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publication-safety:
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - name: Check out complete repository history
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Enforce public-sync boundary and scan history
        shell: pwsh
        run: .\scripts\Test-PublicSync.ps1 -Scope All -SelfTest -ExitWithCode

  windows-tests:
    needs: publication-safety
    runs-on: windows-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.12']

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install pinned schema validator
        run: python -m pip install --disable-pip-version-check jsonschema==4.17.3

      - name: Run the shared source release verification
        shell: pwsh
        # The publication-safety job already performs the all-ref history scan.
        run: .\scripts\Test-FlexShowRelease.ps1 -SkipPublicSync
